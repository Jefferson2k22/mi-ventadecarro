<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMaster | Tu Tienda Online</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome (Iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🛒 ShopMaster</a>
            <button class="btn btn-outline-light position-relative" data-bs-toggle="modal" data-bs-target="#cartModal">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-light py-5 text-center border-bottom mb-4">
        <h1 class="display-4 fw-bold text-dark">Bienvenido a ShopMaster 🛍️</h1>
        <p class="lead">Productos de calidad al alcance de un clic.</p>
    </header>

    <!-- Main Content -->
    <main class="container mb-5">
        <div id="product-container" class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
            <!-- Los productos se cargarán aquí dinámicamente -->
            <div class="text-center w-100">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Cargando productos...</p>
            </div>
        </div>
    </main>

    <!-- Modal Detalle de Producto -->
    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div id="product-detail-content" class="modal-content">
                <!-- Se llena con JS -->
            </div>
        </div>
    </div>

    <!-- Modal Carrito -->
    <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Tu Carrito 🛍️</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="cart-items-list">
                        <p class="text-center">El carrito está vacío.</p>
                    </div>
                    <hr>
                    <h4 class="text-end">Total: $<span id="cart-total">0.00</span></h4>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Seguir comprando</button>
                    <button class="btn btn-primary" id="btn-go-checkout" data-bs-toggle="modal" data-bs-target="#checkoutModal">Ir a Pagar 💳</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Pago (Pasarela) -->
    <div class="modal fade" id="checkoutModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog text-dark">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Finalizar Pago ✅</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="payment-form">
                        <div class="mb-3">
                            <label class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="pay-name" required placeholder="Juan Pérez">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Número de Tarjeta</label>
                            <input type="text" class="form-control" id="pay-card" required placeholder="1234 5678 9101 1121">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Vencimiento</label>
                                <input type="text" class="form-control" placeholder="MM/AA" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">CVV</label>
                                <input type="text" class="form-control" placeholder="123" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">PAGAR AHORA ✅</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Librerías Externas -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
